services:
  - type: web
    name: horas-complementares
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers=2 --threads=2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
    disk:
      name: uploads
      mountPath: /data/horas-complementares/static/uploads
      sizeGB: 1
