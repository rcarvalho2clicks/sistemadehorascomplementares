{% extends "base.html" %}
{% block title %}Nova Submissão{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-7">
        <div class="card">
            <div class="card-header bg-primary text-white text-center">
                <i class="bi bi-plus-circle fs-3"></i>
                <h5 class="mb-0 mt-1">Nova Submissão de Horas Complementares</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-calendar-event me-1"></i> Evento / Atividade</label>
                        <input type="text" name="evento" class="form-control form-control-lg" required
                               placeholder="Ex: Palestra de Inteligência Artificial">
                    </div>

                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-chat-text me-1"></i> Descrição (opcional)</label>
                        <textarea name="descricao" class="form-control" rows="3"
                                  placeholder="Detalhes sobre o evento..."></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label"><i class="bi bi-clock me-1"></i> Carga Horária</label>
                            <div class="input-group">
                                <input type="number" step="0.5" min="0.5" max="999" name="horas"
                                       class="form-control form-control-lg" required placeholder="Ex: 4">
                                <span class="input-group-text">horas</span>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label"><i class="bi bi-file-earmark-pdf me-1"></i> Comprovante</label>
                            <input type="file" name="arquivo" class="form-control form-control-lg" required
                                   accept=".pdf,.png,.jpg,.jpeg,.gif,.webp">
                            <small class="text-muted">Formatos aceitos: PDF, PNG, JPG, GIF (max 5MB)</small>
                        </div>
                    </div>

                    <div class="alert alert-info">
                        <i class="bi bi-info-circle me-1"></i>
                        Ao enviar, sua solicitação ficará <strong>pendente</strong> até que o administrador revise e aprove.
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        <i class="bi bi-send me-1"></i> Enviar para Aprovação
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
