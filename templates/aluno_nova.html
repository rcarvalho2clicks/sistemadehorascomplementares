{% extends "base.html" %}
{% block title %}Nova submissão{% endblock %}
{% block content %}

<div class="page-header">
    <div>
        <h1 class="page-title">Nova submissão</h1>
        <p class="page-subtitle">Preencha os dados e anexe o comprovante do evento.</p>
    </div>
    <a href="{{ url_for('aluno_dashboard') }}" class="btn btn-ghost">← Voltar</a>
</div>

<div class="card" style="max-width:720px;">
    <form method="POST" enctype="multipart/form-data" style="padding:28px;">
        <div class="form-group">
            <label class="form-label">Nome do evento ou atividade</label>
            <input type="text" name="evento" class="form-input" required
                   placeholder="Ex: Palestra de Inteligência Artificial">
            <div class="form-hint">Como aparece no certificado ou declaração.</div>
        </div>

        <div class="form-group">
            <label class="form-label">Descrição (opcional)</label>
            <textarea name="descricao" class="form-textarea" placeholder="Detalhes sobre o evento..."></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">Carga horária</label>
            <input type="number" step="0.5" min="0.5" max="999" name="horas"
                   class="form-input" required placeholder="Ex: 4" style="max-width:200px;">
        </div>

        <div class="form-group">
            <label class="form-label">Comprovante</label>
            <label class="file-input">
                <input type="file" name="arquivo" required accept=".pdf,.png,.jpg,.jpeg,.gif,.webp">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text-3); margin-bottom:8px;">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <div class="file-input-text">
                    <strong>Clique ou arraste</strong> o arquivo aqui
                </div>
                <div class="form-hint" style="margin-top:6px;">PDF, PNG, JPG ou GIF · até 5MB</div>
            </label>
        </div>

        <div style="padding:14px 16px; background:var(--info-soft); border-radius:var(--radius); color:var(--info); font-size:13.5px; margin:24px 0;">
            Sua submissão fica <strong>pendente</strong> até a coordenação revisar e aprovar.
        </div>

        <button type="submit" class="btn btn-primary btn-lg" style="width:100%; justify-content:center;">
            Enviar para aprovação
        </button>
    </form>
</div>

{% endblock %}
